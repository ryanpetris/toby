syntax = "proto3";

package toby.tunnel.v1;

option go_package = "petris.dev/toby/control/tunnel";

// Tunnel multiplexes the sandbox's outbound proxy connections to the host over a
// single gRPC connection carried on the container's stdio (stdin/stdout). The
// in-sandbox manager is the gRPC client; the host is the server. This is the only
// host<->sandbox channel: the host owns upstream credentials and dials the real
// destinations, so the sandbox never sees them.
service Tunnel {
  // Ready is called once by the manager after it binds its local proxy listener,
  // reporting the bound address. It signals the host that the sandbox is up.
  rpc Ready(ReadyRequest) returns (ReadyResponse);

  // Connect carries one accepted proxy connection. The manager streams the raw
  // bytes it reads from the in-sandbox HTTP client; the host replays them into the
  // reverse proxy and streams the upstream response bytes back. A Chunk with
  // close=true signals a half-close in that direction.
  rpc Connect(stream Chunk) returns (stream Chunk);
}

message ReadyRequest {
  string addr = 1;
}

message ReadyResponse {}

message Chunk {
  bytes data = 1;
  bool close = 2;
}
