openapi: 3.1.0
info:
  title: Toby Control JSON-RPC
  version: 0.2.0
  description: >
    Schema documentation for the Toby sandbox control protocol. The protocol is
    JSON-RPC 2.0 over a private Unix stream socket. The host supervisor listens
    on `$XDG_RUNTIME_DIR/toby/control/<pid>.sock` and bind mounts that socket
    into the sandbox as `$XDG_RUNTIME_DIR/toby/sandbox.sock`.
servers:
  - url: unix://$XDG_RUNTIME_DIR/toby/sandbox.sock
    description: Sandbox Unix socket transport, not an HTTP server.
paths:
  /rpc:
    post:
      operationId: sendControlRequest
      summary: Send one JSON-RPC request over the sandbox Unix socket.
      description: >
        This OpenAPI operation models the control payload. It does not imply an
        HTTP endpoint; the actual transport is one newline-terminated JSON-RPC
        request and response over `$XDG_RUNTIME_DIR/toby/sandbox.sock` inside a
        Toby sandbox.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ContextFilesRequest'
                - $ref: '#/components/schemas/GitCommitRequest'
                - $ref: '#/components/schemas/GitFetchRequest'
                - $ref: '#/components/schemas/GitPushRequest'
      responses:
        '200':
          description: JSON-RPC response payload read from the Unix socket.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ContextFilesResponse'
                  - $ref: '#/components/schemas/GitResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    JSONRPCID:
      description: Caller-chosen JSON-RPC request identifier echoed in responses.
      oneOf:
        - type: string
        - type: integer
        - type: 'null'
    JSONRPCVersion:
      type: string
      const: '2.0'
    ContextFilesRequest:
      type: object
      required: [jsonrpc, id, method]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: context_files
      examples:
        - jsonrpc: '2.0'
          id: 1
          method: context_files
    GitCommitRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: git_commit
        params:
          $ref: '#/components/schemas/GitCommitParams'
    GitFetchRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: git_fetch
        params:
          $ref: '#/components/schemas/GitRepositoryParams'
    GitPushRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: git_push
        params:
          $ref: '#/components/schemas/GitPushParams'
    GitRepositoryParams:
      type: object
      required: [repository]
      additionalProperties: false
      properties:
        repository:
          type: string
          description: Repository name visible in the sandbox, relative to XDG_PROJECTS_DIR. Empty, '.', and '..' path segments are rejected.
          examples: [example, foo/bar/baz]
    GitCommitParams:
      type: object
      required: [repository, message]
      additionalProperties: false
      properties:
        repository:
          type: string
          description: Repository name visible in the sandbox, relative to XDG_PROJECTS_DIR. Empty, '.', and '..' path segments are rejected.
        message:
          type: string
          description: Commit message passed to git commit -m. Only already staged files are committed.
    GitPushParams:
      type: object
      required: [repository, branch]
      additionalProperties: false
      properties:
        repository:
          type: string
          description: Repository name visible in the sandbox, relative to XDG_PROJECTS_DIR. Empty, '.', and '..' path segments are rejected.
        branch:
          type: string
          description: Single branch to push.
        origin:
          type: string
          default: origin
          description: Remote name to push to.
    ContextFilesResponse:
      type: object
      required: [jsonrpc, id, result]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        result:
          type: object
          required: [files]
          additionalProperties: false
          properties:
            files:
              type: array
              items:
                $ref: '#/components/schemas/ContextFile'
    ContextFile:
      type: object
      required: [path, mode, data]
      additionalProperties: false
      properties:
        path:
          type: string
          description: Relative path to write under `$XDG_RUNTIME_DIR/toby/context`.
          examples: [GIT_AGENTS.md, opencode/opencode.json, claude/mcp.json]
        mode:
          type: integer
          format: uint32
          description: File permission bits, such as 256 for 0400.
        data:
          type: string
          contentEncoding: base64
          description: File contents. JSON encodes the Go byte slice as base64.
    GitResponse:
      type: object
      required: [jsonrpc, id, result]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        result:
          $ref: '#/components/schemas/GitResult'
    GitResult:
      type: object
      required: [repository, exit_code, stdout, stderr]
      additionalProperties: false
      properties:
        repository:
          type: string
        exit_code:
          type: integer
        stdout:
          type: string
        stderr:
          type: string
    ErrorResponse:
      type: object
      required: [jsonrpc, id, error]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        error:
          type: object
          required: [code, message]
          additionalProperties: false
          properties:
            code:
              type: integer
              enum: [-32700, -32600, -32601, -32602, -32603, -32007]
            message:
              type: string
            data:
              description: Optional implementation-specific error data.
