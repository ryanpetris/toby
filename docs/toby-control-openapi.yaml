openapi: 3.1.0
info:
  title: Toby Control JSON-RPC
  version: 0.3.0
  description: >
    Schema documentation for the Toby sandbox control protocol. The protocol is
    JSON-RPC 2.0 over an authenticated WebSocket. The host listens on
    `127.0.0.1`, the sandbox manager receives `TOBY_CONTROL_HOST=host:port`,
    connects to `ws://host:port/control` with a per-run bearer token, and both sides
    issue JSON-RPC requests over the same persistent bidirectional connection.
    The same host listener also serves `/binary` for the sandbox helper download
    and `/proxy/{id}` for per-run HTTP proxy targets.
servers:
  - url: ws://127.0.0.1/control
    description: WebSocket control transport with a per-run bearer token.
paths:
  /rpc:
    post:
      operationId: sendControlMessage
      summary: Send one JSON-RPC message over the sandbox control transport.
      description: >
        This OpenAPI operation models the control payload. It does not imply a
        normal HTTP request/response endpoint; the actual transport is JSON-RPC
        over a persistent WebSocket connection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ContextInitRequest'
                - $ref: '#/components/schemas/FileCreateRequest'
                - $ref: '#/components/schemas/FileDeleteRequest'
                - $ref: '#/components/schemas/FileMkdirRequest'
                - $ref: '#/components/schemas/FileSymlinkRequest'
                - $ref: '#/components/schemas/EnvironmentGetRequest'
                - $ref: '#/components/schemas/EnvironmentSetRequest'
                - $ref: '#/components/schemas/CommandRunRequest'
                - $ref: '#/components/schemas/CommandExitRequest'
                - $ref: '#/components/schemas/SandboxTerminateRequest'
                - $ref: '#/components/schemas/GitCommitRequest'
                - $ref: '#/components/schemas/GitFetchRequest'
                - $ref: '#/components/schemas/GitPushRequest'
                - $ref: '#/components/schemas/GitRebaseRequest'
                - $ref: '#/components/schemas/GitTagRequest'
      responses:
        '200':
          description: JSON-RPC response payload read from the WebSocket.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EmptyResponse'
                  - $ref: '#/components/schemas/EnvironmentGetResponse'
                  - $ref: '#/components/schemas/GitResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    JSONRPCID:
      description: Caller-chosen JSON-RPC request identifier echoed in responses.
      oneOf:
        - type: string
        - type: integer
        - type: 'null'
    JSONRPCVersion:
      type: string
      const: '2.0'
    ContextInitRequest:
      type: object
      required: [jsonrpc, id, method]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: context.init
      description: Sent by the sandbox manager to ask the host manager to run registered context init services.
    FileCreateRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: file.create
        params:
          $ref: '#/components/schemas/FileCreateParams'
    FileDeleteRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: file.delete
        params:
          $ref: '#/components/schemas/FileDeleteParams'
    FileMkdirRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: file.mkdir
        params:
          $ref: '#/components/schemas/FileMkdirParams'
    FileSymlinkRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: file.symlink
        params:
          $ref: '#/components/schemas/FileSymlinkParams'
    EnvironmentGetRequest:
      type: object
      required: [jsonrpc, id, method]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: environment.get
      description: Sent by the host manager to fetch the sandbox manager's authoritative environment map.
    EnvironmentSetRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: environment.set
        params:
          $ref: '#/components/schemas/EnvironmentSetParams'
    CommandRunRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: command.run
        params:
          $ref: '#/components/schemas/CommandRunParams'
    CommandExitRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: command.exit
        params:
          $ref: '#/components/schemas/CommandExitParams'
    SandboxTerminateRequest:
      type: object
      required: [jsonrpc, id, method]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: sandbox.terminate
      description: Sent by the host manager to make the sandbox manager stop outstanding processes and exit with code 0.
    FileCreateParams:
      type: object
      required: [path]
      additionalProperties: false
      properties:
        path:
          type: string
          description: Path to write inside the sandbox. Parent directories are created before writing.
        mode:
          type: integer
          format: uint32
          default: 420
          description: File permission bits, such as 420 for 0644. Defaults to 0644 when omitted or zero.
        data:
          type: string
          contentEncoding: base64
          description: File contents. JSON encodes the Go byte slice as base64.
        uid:
          oneOf:
            - type: integer
            - type: 'null'
          default: 0
          description: Owner user id. Defaults to 0 (root), including when null. Host-only sentinel -2 is resolved before the sandbox receives the request.
        gid:
          oneOf:
            - type: integer
            - type: 'null'
          default: 0
          description: Owner group id. Defaults to 0 (root), including when null. Host-only sentinel -2 is resolved before the sandbox receives the request.
    FileDeleteParams:
      type: object
      required: [path]
      additionalProperties: false
      properties:
        path:
          type: string
        recursive:
          type: boolean
          default: false
    FileMkdirParams:
      type: object
      required: [path]
      additionalProperties: false
      properties:
        path:
          type: string
        mode:
          type: integer
          format: uint32
          default: 493
          description: Directory permission bits, such as 493 for 0755. Defaults to 0755 when omitted or zero.
        uid:
          oneOf:
            - type: integer
            - type: 'null'
          default: 0
          description: Owner user id. Defaults to 0 (root), including when null. Host-only sentinel -2 is resolved before the sandbox receives the request.
        gid:
          oneOf:
            - type: integer
            - type: 'null'
          default: 0
          description: Owner group id. Defaults to 0 (root), including when null. Host-only sentinel -2 is resolved before the sandbox receives the request.
    FileSymlinkParams:
      type: object
      required: [path, target]
      additionalProperties: false
      properties:
        path:
          type: string
        target:
          type: string
        uid:
          oneOf:
            - type: integer
            - type: 'null'
          default: 0
          description: Symlink owner user id. Defaults to 0 (root), including when null. Host-only sentinel -2 is resolved before the sandbox receives the request.
        gid:
          oneOf:
            - type: integer
            - type: 'null'
          default: 0
          description: Symlink owner group id. Defaults to 0 (root), including when null. Host-only sentinel -2 is resolved before the sandbox receives the request.
    CommandRunParams:
      type: object
      required: [command_id]
      additionalProperties: false
      description: >
        Runs a command inside the sandbox. Background commands require a
        non-empty `argv`. `argv` may be empty or omitted only when
        `foreground` is true; an empty foreground command asks the sandbox
        manager to launch the sandbox user's default interactive shell.
      properties:
        command_id:
          type: string
          format: uuid
        argv:
          type: array
          minItems: 0
          description: Command argv to run inside the sandbox.
          items:
            type: string
        foreground:
          type: boolean
          default: false
          description: At most one foreground command may run at a time.
        hide_output:
          type: boolean
          default: false
        uid:
          oneOf:
            - type: integer
            - type: 'null'
          default: 0
          description: Process user id. Defaults to 0 (root) on the wire, including when null; Toby host-side command execution sends the host uid by default.
        gid:
          oneOf:
            - type: integer
            - type: 'null'
          default: 0
          description: Process group id. Defaults to 0 (root) on the wire, including when null; Toby host-side command execution sends the host gid by default.
        groups:
          type: array
          description: Supplementary group ids. Toby host-side command execution sends the host supplementary groups by default.
          items:
            type: integer
    EnvironmentSetParams:
      type: object
      required: [name, value]
      additionalProperties: false
      properties:
        name:
          type: string
          description: Environment variable name. Names containing '=' or NUL are rejected.
        value:
          type: string
          description: Environment variable value. Empty string unsets the variable; values containing NUL are rejected.
    CommandExitParams:
      type: object
      required: [command_id, exit_code]
      additionalProperties: false
      properties:
        command_id:
          type: string
          format: uuid
        exit_code:
          type: integer
        error:
          type: string
    GitCommitRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: git.commit
        params:
          $ref: '#/components/schemas/GitCommitParams'
    GitFetchRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: git.fetch
        params:
          $ref: '#/components/schemas/GitRepositoryParams'
    GitPushRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: git.push
        params:
          $ref: '#/components/schemas/GitPushParams'
    GitRebaseRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: git.rebase
        params:
          $ref: '#/components/schemas/GitRebaseParams'
    GitTagRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: git.tag
        params:
          $ref: '#/components/schemas/GitTagParams'
    GitRepositoryParams:
      type: object
      required: [repository]
      additionalProperties: false
      properties:
        repository:
          type: string
          description: Repository name visible in the sandbox, relative to the sandbox project root. Empty, '.', and '..' path segments are rejected.
          examples: [example, foo/bar/baz]
    GitCommitParams:
      type: object
      required: [repository, message]
      additionalProperties: false
      properties:
        repository:
          type: string
        message:
          type: string
          description: Commit message passed to git commit -m. Only already staged files are committed.
        amend:
          type: boolean
          default: false
          description: Amend the previous commit when true.
    GitPushParams:
      type: object
      required: [repository, branch]
      additionalProperties: false
      properties:
        repository:
          type: string
        branch:
          type: string
          description: Single branch to push.
        origin:
          type: string
          default: origin
          description: Remote name to push to.
        tags:
          type: boolean
          default: false
          description: Push all tags with --tags when true.
    GitRebaseParams:
      type: object
      required: [repository]
      additionalProperties: false
      description: Exactly one of base, continue, or abort must be provided.
      properties:
        repository:
          type: string
        base:
          type: string
          description: Base ref to rebase onto.
        continue:
          type: boolean
          default: false
          description: Continue an in-progress rebase when true.
        abort:
          type: boolean
          default: false
          description: Abort an in-progress rebase when true.
    GitTagParams:
      type: object
      required: [repository, tag, message]
      additionalProperties: false
      properties:
        repository:
          type: string
        tag:
          type: string
          description: Annotated tag name to create.
        message:
          type: string
          description: Tag message passed to git tag -m.
        target:
          type: string
          description: Optional object to tag. Defaults to HEAD.
    EmptyResponse:
      type: object
      required: [jsonrpc, id, result]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        result:
          type: object
          additionalProperties: false
    GitResponse:
      type: object
      required: [jsonrpc, id, result]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        result:
          $ref: '#/components/schemas/GitResult'
    EnvironmentGetResponse:
      type: object
      required: [jsonrpc, id, result]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        result:
          $ref: '#/components/schemas/EnvironmentGetResult'
    EnvironmentGetResult:
      type: object
      required: [environment]
      additionalProperties: false
      properties:
        environment:
          type: object
          additionalProperties:
            type: string
          description: Snapshot of the sandbox manager environment map.
    GitResult:
      type: object
      required: [repository, exit_code, stdout, stderr]
      additionalProperties: false
      properties:
        repository:
          type: string
        exit_code:
          type: integer
        stdout:
          type: string
        stderr:
          type: string
    ErrorResponse:
      type: object
      required: [jsonrpc, id, error]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        error:
          type: object
          required: [code, message]
          additionalProperties: false
          properties:
            code:
              type: integer
              enum: [-32700, -32600, -32601, -32602, -32603, -32007]
            message:
              type: string
            data:
              description: Optional implementation-specific error data.
