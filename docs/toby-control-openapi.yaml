openapi: 3.1.0
info:
  title: Toby Control JSON-RPC
  version: 0.2.0
  description: >
    Schema documentation for the Toby sandbox control protocol. The protocol is
    JSON-RPC 2.0 over a private Unix stream socket. The host listens on
    `$XDG_RUNTIME_DIR/toby/control/<pid>.sock` and bind mounts that socket into
    the sandbox as `$XDG_RUNTIME_DIR/toby/sandbox.sock`. The sandbox manager
    connects to that socket and both sides can issue newline-terminated JSON-RPC
    requests over the same connection.
servers:
  - url: unix://$XDG_RUNTIME_DIR/toby/sandbox.sock
    description: Sandbox Unix socket transport, not an HTTP server.
paths:
  /rpc:
    post:
      operationId: sendControlMessage
      summary: Send one JSON-RPC message over the sandbox Unix socket.
      description: >
        This OpenAPI operation models the control payload. It does not imply an
        HTTP endpoint; the actual transport is newline-terminated JSON-RPC over
        `$XDG_RUNTIME_DIR/toby/sandbox.sock` inside a Toby sandbox.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ContextInitRequest'
                - $ref: '#/components/schemas/FileCreateRequest'
                - $ref: '#/components/schemas/FileDeleteRequest'
                - $ref: '#/components/schemas/FileMkdirRequest'
                - $ref: '#/components/schemas/FileSymlinkRequest'
                - $ref: '#/components/schemas/CommandRunRequest'
                - $ref: '#/components/schemas/CommandExitRequest'
                - $ref: '#/components/schemas/SandboxTerminateRequest'
                - $ref: '#/components/schemas/GitCommitRequest'
                - $ref: '#/components/schemas/GitFetchRequest'
                - $ref: '#/components/schemas/GitPushRequest'
      responses:
        '200':
          description: JSON-RPC response payload read from the Unix socket.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EmptyResponse'
                  - $ref: '#/components/schemas/GitResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    JSONRPCID:
      description: Caller-chosen JSON-RPC request identifier echoed in responses.
      oneOf:
        - type: string
        - type: integer
        - type: 'null'
    JSONRPCVersion:
      type: string
      const: '2.0'
    ContextInitRequest:
      type: object
      required: [jsonrpc, id, method]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: context.init
      description: Sent by the sandbox manager to ask the host manager to run registered context init services.
    FileCreateRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: file.create
        params:
          $ref: '#/components/schemas/FileCreateParams'
    FileDeleteRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: file.delete
        params:
          $ref: '#/components/schemas/FileDeleteParams'
    FileMkdirRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: file.mkdir
        params:
          $ref: '#/components/schemas/FileMkdirParams'
    FileSymlinkRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: file.symlink
        params:
          $ref: '#/components/schemas/FileSymlinkParams'
    CommandRunRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: command.run
        params:
          $ref: '#/components/schemas/CommandRunParams'
    CommandExitRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: command.exit
        params:
          $ref: '#/components/schemas/CommandExitParams'
    SandboxTerminateRequest:
      type: object
      required: [jsonrpc, id, method]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: sandbox.terminate
      description: Sent by the host manager to make the sandbox manager stop outstanding processes and exit with code 0.
    FileCreateParams:
      type: object
      required: [path, mode, data]
      additionalProperties: false
      properties:
        path:
          type: string
          description: Path to write inside the sandbox.
        mode:
          type: integer
          format: uint32
          description: File permission bits, such as 256 for 0400.
        data:
          type: string
          contentEncoding: base64
          description: File contents. JSON encodes the Go byte slice as base64.
    FileDeleteParams:
      type: object
      required: [path]
      additionalProperties: false
      properties:
        path:
          type: string
        recursive:
          type: boolean
          default: false
    FileMkdirParams:
      type: object
      required: [path, mode]
      additionalProperties: false
      properties:
        path:
          type: string
        mode:
          type: integer
          format: uint32
          description: Directory permission bits, such as 448 for 0700.
    FileSymlinkParams:
      type: object
      required: [path, target]
      additionalProperties: false
      properties:
        path:
          type: string
        target:
          type: string
    CommandRunParams:
      type: object
      required: [command_id, argv]
      additionalProperties: false
      properties:
        command_id:
          type: string
          format: uuid
        argv:
          type: array
          minItems: 1
          items:
            type: string
        foreground:
          type: boolean
          default: false
          description: At most one foreground command may run at a time.
        hide_output:
          type: boolean
          default: false
    CommandExitParams:
      type: object
      required: [command_id, exit_code]
      additionalProperties: false
      properties:
        command_id:
          type: string
          format: uuid
        exit_code:
          type: integer
        error:
          type: string
    GitCommitRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: git.commit
        params:
          $ref: '#/components/schemas/GitCommitParams'
    GitFetchRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: git.fetch
        params:
          $ref: '#/components/schemas/GitRepositoryParams'
    GitPushRequest:
      type: object
      required: [jsonrpc, id, method, params]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        method:
          type: string
          const: git.push
        params:
          $ref: '#/components/schemas/GitPushParams'
    GitRepositoryParams:
      type: object
      required: [repository]
      additionalProperties: false
      properties:
        repository:
          type: string
          description: Repository name visible in the sandbox, relative to XDG_PROJECTS_DIR. Empty, '.', and '..' path segments are rejected.
          examples: [example, foo/bar/baz]
    GitCommitParams:
      type: object
      required: [repository, message]
      additionalProperties: false
      properties:
        repository:
          type: string
        message:
          type: string
          description: Commit message passed to git commit -m. Only already staged files are committed.
    GitPushParams:
      type: object
      required: [repository, branch]
      additionalProperties: false
      properties:
        repository:
          type: string
        branch:
          type: string
          description: Single branch to push.
        origin:
          type: string
          default: origin
          description: Remote name to push to.
    EmptyResponse:
      type: object
      required: [jsonrpc, id, result]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        result:
          type: object
          additionalProperties: false
    GitResponse:
      type: object
      required: [jsonrpc, id, result]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        result:
          $ref: '#/components/schemas/GitResult'
    GitResult:
      type: object
      required: [repository, exit_code, stdout, stderr]
      additionalProperties: false
      properties:
        repository:
          type: string
        exit_code:
          type: integer
        stdout:
          type: string
        stderr:
          type: string
    ErrorResponse:
      type: object
      required: [jsonrpc, id, error]
      additionalProperties: false
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JSONRPCVersion'
        id:
          $ref: '#/components/schemas/JSONRPCID'
        error:
          type: object
          required: [code, message]
          additionalProperties: false
          properties:
            code:
              type: integer
              enum: [-32700, -32600, -32601, -32602, -32603, -32007]
            message:
              type: string
            data:
              description: Optional implementation-specific error data.
